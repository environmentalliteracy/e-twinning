<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dijital Çevre Projesi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop") no-repeat center center/cover;
    min-height:100vh;
    color:white;
    overflow-x:hidden;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(4px);
    z-index:-1;
}

/* Header */
header{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;   /* yatay padding */
    height: 90px;          /* header yüksekliğini net belirle */
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px); /* hafif daha belirgin blur */
    z-index:10000;
}

/* Logo */
.logo img{
    height:85px;
    width:auto;
    object-fit:cover;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    padding:8px;
    backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s ease;
}

.logo img:hover{
    transform:scale(1.05);
}

/* Navbar */
.navbar{
    display: flex;
    gap: 25px;
    flex-wrap: wrap; /* ekran daralırsa alt satıra geçer */
    justify-content: flex-end;
}

.navbar a{
    text-decoration:none;
    color:white;
    font-weight:500;
    position:relative;
}

.navbar a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:white;
    transition:0.3s;
}

.navbar a:hover::after{
    width:100%;
}

/* Hero */
.hero{
    text-align:center;
    padding-top: 140px;
    padding-bottom:100px;
}

.hero h1{
    font-family:'Montserrat',sans-serif;
    font-size:3.5rem;
    margin-bottom:25px;
    text-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.hero p{
    max-width:850px;
    margin:auto;
    font-size:1.2rem;
    opacity:0.95;
}

/* Gallery */
.gallery{
    width:92%;
    max-width:2000px;
    margin:100px auto 140px auto;
    padding:0 40px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:60px;
}

/* Card */
.card{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(18px);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,0.45);
    transition:0.4s ease;
    aspect-ratio:16/9; /* kare kart */
}

.card:hover{
    transform:translateY(-12px) scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* Responsive */
@media(max-width:1200px){
    .gallery{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media(max-width:768px){
    header{
        flex-direction: column;
        align-items: flex-start;
        padding: 15px 20px;
    }

    .logo img{
        height:65px;
    }

    .gallery{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:2.3rem;
    }

    .navbar{
        width:100%;
        justify-content: space-around;
        margin-top: 10px;
    }
}

/* Lightbox */
#lightbox{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10001;
    padding-top: 150px;
    box-sizing:border-box;
    opacity:0;
    visibility:hidden;
    transition: opacity 0.35s ease;
}

#lightbox.active{
    opacity:1;
    visibility:visible;
    backdrop-filter: blur(6px);
}

#lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    transform:scale(0.8);
    transition:transform 0.35s ease;
}

#lightbox.active img{
    transform:scale(1);
}

#close{
    position: fixed;        /* absolute yerine fixed */
    top: 140px;              /* üstten boşluk */
    right: 160px;            /* sağdan boşluk */
    font-size: 45px;
    color: white;
    background: rgba(0,0,0,0.6); /* hafif arka plan */
    border-radius: 50%;
    padding: 1px 14px;      /* tıklama alanını büyüt */
    cursor: pointer;
    z-index: 10002;         /* header ve lightbox’ın üstünde */
    box-shadow: 0 4px 15px rgba(0,0,0,0.7);
    transition: 0.3s ease;
}

</style>
</head>

<body>

<div class="overlay"></div>

<header>
    <div class="logo">
        <img src="logo.jpg.jpeg" alt="Proje Logosu">
    </div>

    <nav class="navbar">
        <a href="karikaturler.html">Karikatürlerimiz</a>
        <a href="iletisim.html">İletişim</a>
        <a href="padlet.html">Öğrencilerin Çalışmaları</a>
    </nav>
</header>

<div class="hero">
    <h1>Environmental Literacy Journey</h1>
    <p>
        Doğayı korumak bir tercih değil, bir sorumluluktur.
        Bu proje kapsamında çevre bilincini artırmayı ve sürdürülebilir bir gelecek için farkındalık oluşturmayı hedefliyoruz.
    </p>
</div>

<div class="gallery">
    <div class="card"><img src="Slide1.jpg"></div>
    <div class="card"><img src="Slide2.jpg"></div>
    <div class="card"><img src="Slide3.jpg"></div>
    <div class="card"><img src="Slide4.jpg"></div>
    <div class="card"><img src="Slide5.jpg"></div>
    <div class="card"><img src="Slide6.jpg"></div>
    <div class="card"><img src="Slide7.jpg"></div>
    <div class="card"><img src="Slide8.jpg"></div>
    <div class="card"><img src="Slide9.jpg"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
    <span id="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll(".card img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.getElementById("close");

images.forEach(img=>{
    img.addEventListener("click", ()=>{
        lightbox.classList.add("active");
        lightboxImg.src = img.src;
    });
});

closeBtn.onclick = ()=>{
    lightbox.classList.remove("active");
};

lightbox.onclick = (e)=>{
    if(e.target !== lightboxImg){
        lightbox.classList.remove("active");
    }
};
</script>

</body>
</html>

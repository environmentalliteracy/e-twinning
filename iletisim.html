<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Environmental Literacy Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop") no-repeat center center/cover;
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* Overlay */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
z-index:-1;
}

/* HEADER (index ile aynı) */

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
height:90px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
z-index:10000;
}

/* Logo */

.logo img{
height:85px;
width:auto;
object-fit:cover;
border-radius:20px;
background:rgba(255,255,255,0.12);
padding:8px;
backdrop-filter:blur(8px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s ease;
}

.logo img:hover{
transform:scale(1.05);
}

/* Navbar */

.navbar{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:flex-end;
}

.navbar a{
text-decoration:none;
color:white;
font-weight:500;
position:relative;
}

.navbar a::after{
content:"";
position:absolute;
width:0%;
height:2px;
left:0;
bottom:-5px;
background:white;
transition:0.3s;
}

.navbar a:hover::after{
width:100%;
}

/* FORM CONTAINER */

.form-container{
width:90%;
max-width:700px;
margin:160px auto 120px auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
padding:50px;
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.45);
}

.form-container h1{
text-align:center;
margin-bottom:30px;
font-family:'Montserrat',sans-serif;
font-size:2.8rem;
text-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:20px;
}

input, textarea{
padding:15px;
border:none;
border-radius:15px;
font-family:'Poppins',sans-serif;
font-size:1rem;
outline:none;
}

textarea{
resize:none;
height:150px;
}

button{
padding:15px;
border:none;
border-radius:15px;
background:#2ecc71;
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
transition:0.3s ease;
}

button:hover{
background:#27ae60;
transform:scale(1.03);
}

/* Responsive */

@media(max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
padding:15px 20px;
}

.logo img{
height:65px;
}

.form-container{
padding:30px;
margin-top:140px;
}

.navbar{
width:100%;
justify-content:space-around;
margin-top:10px;
}

.form-container h1{
font-size:2.3rem;
}

}

</style>
</head>

<body>

<div class="overlay"></div>

<header>

<div class="logo">
<a href="index.html">
<img src="logo.jpg.jpeg" alt="Proje Logosu">
</a>
</div>

<nav class="navbar">
<a href="index.html">Home</a>
<a href="karikaturler.html">Our Cartoons</a>
<a href="padlet.html">Students’ Work</a>

</nav>

</header>

<div class="form-container">

<h1>Contact Us</h1>

<form action="https://formsubmit.co/infocemilehamdi@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="index.html">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
